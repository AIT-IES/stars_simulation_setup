# agc_central_kp_f = 0.0
# agc_central_ki_f = 1.0
# agc_central_ki_Q = 0.3
# agc_central_kp_Q = 0.1
## UNSTABLE
agc_central_kp_f = 5.0 
agc_central_ki_f = 10.0
agc_central_kp_Q = 1.0
agc_central_ki_Q = 3.0